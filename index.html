<script>
(function(){
  var target = 'en/';
  var countryMap = {
    'CN':'zh/','HK':'zh/','TW':'zh/','MO':'zh/',
    'RU':'ru/','KZ':'ru/','BY':'ru/','UA':'ru/','UZ':'ru/','KG':'ru/','TJ':'ru/','AM':'ru/','AZ':'ru/','MD':'ru/','LV':'ru/','LT':'ru/','EE':'ru/','GE':'ru/'
  };
  
  function doRedirect(){
    document.getElementById('detect').textContent = 'Redirecting to ' + target + '...';
    setTimeout(function(){window.location.href=target;}, 600);
  }
  
  // Check browser language first
  var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase().split('-')[0];
  if(lang === 'zh') target = 'zh/';
  else if(lang === 'ru') target = 'ru/';
  
  // Try IP geolocation for more accuracy
  fetch('https://ipapi.co/json/', {cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(data){
      var cc = (data.country_code || '').toUpperCase();
      if(countryMap[cc]) target = countryMap[cc];
      doRedirect();
    })
    .catch(function(){
      // Fallback: try ip-api.com
      fetch('http://ip-api.com/json/?fields=countryCode', {cache:'no-store'})
        .then(function(r){return r.json();})
        .then(function(data){
          var cc = (data.countryCode || '').toUpperCase();
          if(countryMap[cc]) target = countryMap[cc];
          doRedirect();
        })
        .catch(function(){doRedirect();});
    });
})();
</script>
